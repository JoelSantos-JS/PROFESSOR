appId: com.soaken.app
productName: Soaken
copyright: Copyright © 2025 Soaken

directories:
  output: release
  buildResources: resources

files:
  - dist/**
  - dist-electron/**
  - package.json

# Modelo da voz local (Kokoro) embutido no instalador → app já abre com a voz, sem download.
extraResources:
  - from: kokoro-bundle/models
    to: models

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch: x64
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Soaken
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico

asar: true
compression: maximum
